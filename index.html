<!DOCTYPE html>
<html>
<head>
  <title>Smart Price Comparator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 300px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .container {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      width: 280px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: left;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .best {
      border: 3px solid #16a34a;
    }

    .badge {
      background: #16a34a;
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
    }

  </style>
</head>
<body>

<h1>🔥 Smart Price Comparator</h1>

<input type="text" id="search" placeholder="Search products..." oninput="debounceSearch()">

<div class="container" id="list"></div>

<script>
let timeout;

function debounceSearch() {
  clearTimeout(timeout);
  timeout = setTimeout(loadProducts, 400);
}

async function loadProducts() {
  const search = document.getElementById("search").value;

  if (!search) {
    document.getElementById("list").innerHTML = "";
    return;
  }

  const res = await fetch(
    `http://localhost:5000/api/search?q=${search}`
  );

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((p, index) => {
    const div = document.createElement("div");
    div.className = "card";

    if (index === 0) {
      div.classList.add("best");
    }

    div.innerHTML = `
      ${index === 0 ? '<div class="badge">Best Value</div>' : ""}
      <h3>${p.name}</h3>
      <div class="price">$${p.price}</div>
      <p>⭐ ${p.rating} | 🗳 ${p.reviews} reviews</p>
      <p><strong>Value Score:</strong> ${p.valueScore.toFixed(3)}</p>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
